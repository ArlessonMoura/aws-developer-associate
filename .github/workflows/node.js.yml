name: Deploy do Vite no GitHub Pages

on:
  push:
    branches: ['main'] # Substitua por 'master' se a sua branch principal for master

  # Permite rodar o workflow manualmente pela aba Actions do GitHub
  workflow_dispatch:

# Define permissões necessárias do token GITHUB_TOKEN para publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Build
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Enviar artefato do build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Pasta gerada pelo build do Vite

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
